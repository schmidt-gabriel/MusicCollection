name: Build and Release

on:
  push:
    tags: [ "**" ]

jobs:
  release-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: [ amd64, arm64 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/src/go.mod

      - name: Build binary
        working-directory: backend/src
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          BIN_NAME="backend-linux-${GOARCH}"
          go build -trimpath -ldflags="-s -w" -o "$GITHUB_WORKSPACE/dist/${BIN_NAME}" .

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/backend-linux-${{ matrix.arch }}
