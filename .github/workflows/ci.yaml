name: CI

on:
  pull_request:
    paths:
      - 'music_web_app/**'
      - '.github/workflows/ci.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: music_web_app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: music_web_app/package-lock.json

      - run: npm ci

      # Runs tsc --noEmit and the Vite build.
      - run: npm run build
